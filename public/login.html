<div class="container">
    <h2>로그인</h2>
    <p class="subtitle">GET 방식으로 전송해봅시다!</p>
    <form method="GET" action="/users/login">
        <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" name="email" id="email" placeholder="Email을 입력해주세요" required>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" name="password" id="password" placeholder="비밀번호를 입력해주세요" required>
        </div>
        <button type="submit" class="login-btn">로그인</button>
    </form>
</div>
